<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Projets</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F7F5;--surface:#fff;--surface2:#F2F2F0;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A1A1A;--text2:#6B6B6B;--text3:#A0A0A0;
  --radius:10px;--radius-lg:14px;--accent:#E2445C
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1C1C1A;--surface2:#252523;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#EBEBEB;--text2:#999;--text3:#666
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:10px;height:56px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s}
.icon-btn:hover{color:var(--text)}
.icon-btn.active{color:#00C875;border-color:#00C875}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s}
.sync-dot.live{background:#00C875}
.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.tab-count{font-size:11px;background:var(--surface2);color:var(--text3);border-radius:20px;padding:1px 7px}
.content{max-width:820px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.person-view{display:none}
.person-view.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:26px;font-weight:600}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px;padding-left:2px}
.project-list{display:flex;flex-direction:column;gap:8px}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .15s}
.project-card:hover,.project-card.open{border-color:var(--border2)}
.project-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.status-stripe{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.project-info{flex:1;min-width:0}
.project-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-sub{display:flex;align-items:center;gap:8px;margin-top:4px}
.project-date{font-size:12px;color:var(--text2)}
.pct-wrap{display:flex;align-items:center;gap:6px}
.pct-bar{width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.pct-fill{height:100%;border-radius:2px;transition:width .4s}
.pct-label{font-size:11px;color:var(--text3);min-width:26px}
.status-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;cursor:pointer;border:none;font-family:inherit}
.msg-count{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);flex-shrink:0}
.chevron-icon{font-size:16px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.project-card.open .chevron-icon{transform:rotate(180deg)}
.messages-panel{display:none;border-top:1px solid var(--border)}
.project-card.open .messages-panel{display:block}
.proj-info-panel{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.pct-editor{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.pct-editor label{font-size:12px;color:var(--text2);white-space:nowrap}
.pct-editor input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.pct-val{font-size:13px;font-weight:600;color:var(--text);min-width:36px;text-align:right}
.msg-thread{padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:20px}
.msg{display:flex;gap:10px;align-items:flex-start;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;margin-top:1px}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.msg-author{font-size:13px;font-weight:500;color:var(--text)}
.msg-time{font-size:11px;color:var(--text3)}
.msg-bubble{font-size:13px;color:var(--text);background:var(--surface2);border-radius:2px var(--radius) var(--radius) var(--radius);padding:9px 13px;line-height:1.55;display:inline-block;max-width:100%;word-break:break-word}
.empty-thread{padding:12px 0;text-align:center;font-size:13px;color:var(--text3)}
.author-row{padding:10px 16px 0;display:flex;align-items:center;gap:8px}
.author-row label{font-size:12px;color:var(--text2)}
.author-row select{font-size:12px;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;outline:none}
.input-zone{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.input-zone textarea{flex:1;min-height:38px;max-height:120px;padding:9px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);resize:none;font-family:inherit;line-height:1.5;transition:border-color .15s;outline:none}
.input-zone textarea:focus{border-color:var(--accent)}
.input-zone textarea::placeholder{color:var(--text3)}
.send-btn{width:38px;height:38px;border-radius:var(--radius);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;transition:opacity .15s}
.send-btn:hover{opacity:.85}
.add-project-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius-lg);color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;margin-top:8px}
.add-project-btn:hover{border-color:var(--accent);color:var(--accent)}
.mention{background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 5px;font-weight:600;font-size:12px}
.mention.me{background:#E2445C;color:#fff}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:480px;margin:1rem;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{padding:8px 16px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.btn-confirm{padding:8px 16px;font-size:13px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;font-weight:500}
.role-pill{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
.role-cdp{background:#EEF4FF;color:#185FA5}
.role-sup{background:#E8F5E9;color:#166534}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.empty-state{text-align:center;padding:3rem 0;color:var(--text3);font-size:14px}
@media(max-width:600px){
  .content{padding:.75rem}
  .topbar,.tabs-wrap{padding:0 .75rem}
  .tab{padding:10px 10px;font-size:12px;gap:6px}
  .tab-avatar{width:20px;height:20px;font-size:9px}
  .project-header{padding:12px;gap:8px}
  .project-name{font-size:13px}
  .project-date,.msg-count{display:none}
  .pct-bar{width:36px}
  .status-badge{font-size:10px;padding:2px 7px}
  .msg-thread,.input-zone,.author-row,.pct-editor{padding-left:12px;padding-right:12px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stat-value{font-size:22px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-dot"></div> Suivi Projets</div>
  <button class="icon-btn" onclick="openMembersModal()" title="Gérer les membres"><i class="ti ti-users" style="font-size:16px"></i></button>
  <button class="icon-btn" onclick="resetAll()" title="Réinitialiser les données" style="color:#E2445C"><i class="ti ti-refresh" style="font-size:16px"></i></button>
  <div class="topbar-right">
    <label style="font-size:12px;color:var(--text3)">Je suis :</label>
    <select id="myIdentity" onchange="setIdentity(this.value)" style="font-size:12px;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;outline:none"></select>
    <button id="notifBtn" class="icon-btn" onclick="requestNotifPermission()" title="Activer les notifications" style="display:none"><i class="ti ti-bell" style="font-size:16px"></i></button>
    <div class="sync-badge"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Connexion…</span></div>
  </div>
</div>

<div class="tabs-wrap" id="tabs"></div>
<div class="content" id="content"></div>

<!-- Modal nouveau projet -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3>Nouveau projet</h3>
    <label>Nom du projet *</label>
    <input type="text" id="modalName" placeholder="Ex: CANAL TOYS UK - Variations">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
      <div><label style="margin-top:0">Date limite</label><input type="text" id="modalDate" placeholder="Ex: mai 15"></div>
      <div><label style="margin-top:0">Priorité</label>
        <select id="modalPriority">
          <option value="">— aucune —</option>
          <option value="haute">🔴 Haute</option>
          <option value="normale">🟡 Normale</option>
          <option value="basse">🟢 Basse</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
      <div><label style="margin-top:0">Statut</label>
        <select id="modalStatus">
          <option>Pas commencé</option><option>En cours</option><option>Fait</option><option>Bloqué</option>
        </select>
      </div>
      <div><label style="margin-top:0">Avancement</label>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <input type="range" id="modalPct" min="0" max="100" step="5" value="0" style="flex:1;accent-color:#E2445C" oninput="document.getElementById('modalPctVal').textContent=this.value+'%'">
          <span id="modalPctVal" style="font-size:12px;font-weight:600;min-width:32px">0%</span>
        </div>
      </div>
    </div>
    <label>Description / contexte</label>
    <textarea id="modalDesc" placeholder="Informations utiles, contexte client…" style="min-height:72px;resize:vertical"></textarea>
    <label>Lien fichier / document</label>
    <div style="display:flex;gap:8px">
      <input type="url" id="modalLink" placeholder="https://drive.google.com/…" style="flex:1">
      <input type="text" id="modalLinkLabel" placeholder="Nom du lien" style="width:130px">
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:4px">Google Drive, Dropbox, Notion…</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmAddProject()">Ajouter</button>
    </div>
  </div>
</div>

<!-- Modal gestion membres -->
<div class="modal-backdrop" id="membersBackdrop">
  <div class="modal">
    <h3>Gérer les membres</h3>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button id="filterAll" onclick="setMemberFilter('all')" style="flex:1;padding:6px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);cursor:pointer;font-family:inherit;background:var(--accent);color:#fff">Tous</button>
      <button id="filterCdp" onclick="setMemberFilter('cdp')" style="flex:1;padding:6px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);cursor:pointer;font-family:inherit;background:var(--surface);color:var(--text2)">Consultants</button>
      <button id="filterSup" onclick="setMemberFilter('sup')" style="flex:1;padding:6px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);cursor:pointer;font-family:inherit;background:var(--surface);color:var(--text2)">Supports</button>
    </div>
    <div id="membersList" style="display:flex;flex-direction:column;gap:7px;max-height:220px;overflow-y:auto;margin-bottom:16px"></div>
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <p style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Ajouter un membre</p>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="text" id="newMemberName" placeholder="Prénom" style="flex:1;padding:8px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none">
        <input type="text" id="newMemberInitials" placeholder="XX" style="width:60px;padding:8px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none">
        <input type="color" id="newMemberColor" value="#579BFC" style="width:40px;height:38px;padding:2px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surface)">
      </div>
      <div style="display:flex;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;flex:1;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);margin:0">
          <input type="radio" name="newRole" value="support" checked> Support <span style="font-size:10px;color:var(--text3)">(a un onglet)</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;flex:1;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);margin:0">
          <input type="radio" name="newRole" value="cdp"> Consultant <span style="font-size:10px;color:var(--text3)">(pas d'onglet)</span>
        </label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeMembersModal()">Fermer</button>
      <button class="btn-confirm" onclick="addMember()">Ajouter</button>
    </div>
  </div>
</div>

<script type="module">

// ── Identity ───────────────────────────────────────────────────────────────
window.setIdentity = (name) => {
  myName = name;
  localStorage.setItem('myName', name);
  updateNotifBtn();
};

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!myName) { btn.style.display = 'none'; return; }
  btn.style.display = 'flex';
  btn.classList.toggle('active', Notification.permission === 'granted');
  btn.title = Notification.permission === 'granted' ? 'Notifications activées' : 'Activer les notifications';
}

window.requestNotifPermission = async () => {
  await Notification.requestPermission();
  updateNotifBtn();
  if (Notification.permission === 'granted') toast('Notifications activées !');
};

function maybeNotify(projName, msg) {
  if (!myName || !appReady || msg.author === myName) return;
  if (!(msg.text||'').toLowerCase().includes('@' + myName.toLowerCase())) return;
  if (Notification.permission === 'granted') {
    const n = new Notification(`@${myName} mentionné — ${projName}`, { body: `${msg.author} : ${msg.text}` });
    n.onclick = () => { window.focus(); n.close(); };
  }
  toast(`@${myName} mentionné par ${msg.author}`);
}

function toast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:999;transition:opacity .3s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', 3000);
}

// ── Seed ───────────────────────────────────────────────────────────────────
window.resetAll = async () => {
  if (!confirm('Réinitialiser toutes les données ? Projets et membres seront remis à zéro.')) return;
  await set(ref(db,'projects'), null);
  await set(ref(db,'members'), null);
  await set(ref(db,'messages'), null);
  await seedProjects();
  await seedMembers();
  toast('Données réinitialisées !');
};

async function seedProjects() {
  const snap = await new Promise(r => onValue(ref(db,'projects'), r, {onlyOnce:true}));
  if (snap.exists()) return;
  for (const [pid, projs] of Object.entries(SEED)) {
    for (const p of projs) {
      const pr = push(ref(db, `projects/${pid}`));
      await set(pr, { name:p.name, status:p.status, date:p.date, pct:p.pct, desc:'', link:'', linkLabel:'', priority:'' });
      for (const m of (p.msgs||[])) await push(ref(db,`messages/${pr.key}`), {author:m.a, time:m.t, text:m.m});
    }
  }
}

async function seedMembers() {
  const snap = await new Promise(r => onValue(ref(db,'members'), r, {onlyOnce:true}));
  if (snap.exists()) return;
  for (const m of DEFAULT_MEMBERS) await push(ref(db,'members'), m);
}

// ── Role helpers (accepte 'support' ET 'operateur' legacy) ───────────────
const isSupport = p => p.role==='support' || p.role==='operateur' || !p.role;
const isCdp     = p => p.role==='cdp';

// ── Members ────────────────────────────────────────────────────────────────
function listenMembers() {
  onValue(ref(db,'members'), snap => {
    PEOPLE = [];
    COLORS = { Admin:'#888' };
    snap.forEach(c => { const m = {_key:c.key,...c.val()}; PEOPLE.push(m); COLORS[m.name]=m.color; });
    rebuildTabs();
    refreshIdentitySelect();
    renderMembersList();
  });
}

window.addMember = () => {
  const name = document.getElementById('newMemberName').value.trim();
  if (!name) return;
  const initials = (document.getElementById('newMemberInitials').value.trim().toUpperCase() || name.slice(0,2).toUpperCase());
  const color = document.getElementById('newMemberColor').value;
  const role = document.querySelector('input[name="newRole"]:checked')?.value || 'support';
  push(ref(db,'members'), {name, initials, color, role});
  document.getElementById('newMemberName').value = '';
  document.getElementById('newMemberInitials').value = '';
};

window.removeMember = (key) => {
  if (!confirm('Supprimer ce membre ?')) return;
  remove(ref(db,`members/${key}`));
};

window.setMemberFilter = (f) => {
  memberFilter = f;
  ['all','cdp','sup'].forEach(x => {
    const id = 'filter' + x.charAt(0).toUpperCase() + x.slice(1);
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.style.background = x===f ? 'var(--accent)' : 'var(--surface)';
    btn.style.color = x===f ? '#fff' : 'var(--text2)';
  });
  renderMembersList();
};

function renderMembersList() {
  const el = document.getElementById('membersList');
  if (!el) return;
  const list = PEOPLE.filter(p =>
    memberFilter === 'cdp' ? isCdp(p) :
    memberFilter === 'sup' ? isSupport(p) : true
  );
  if (!list.length) { el.innerHTML = '<p style="text-align:center;font-size:13px;color:var(--text3);padding:1rem">Aucun membre</p>'; return; }
  el.innerHTML = list.map(p => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius)">
      <div style="width:28px;height:28px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0">${p.initials}</div>
      <div style="flex:1">
        <span style="font-size:13px;font-weight:500">${p.name}</span>
        <span class="role-pill ${isCdp(p)?'role-cdp':'role-sup'}" style="margin-left:6px">${isCdp(p)?'Consultant':'Support'}</span>
      </div>
      <button onclick="removeMember('${p._key}')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px"><i class="ti ti-trash" style="font-size:15px"></i></button>
    </div>`).join('');
}

function refreshIdentitySelect() {
  const sel = document.getElementById('myIdentity');
  if (!sel) return;
  const cur = myName;
  const cdps = PEOPLE.filter(p => isCdp(p));
  const opes = PEOPLE.filter(p => isSupport(p));
  sel.innerHTML = `<option value="">— choisir —</option>`;
  if (cdps.length) sel.innerHTML += `<optgroup label="Consultants">${cdps.map(p=>`<option${p.name===cur?' selected':''}>${p.name}</option>`).join('')}</optgroup>`;
  if (opes.length) sel.innerHTML += `<optgroup label="Supports">${opes.map(p=>`<option${p.name===cur?' selected':''}>${p.name}</option>`).join('')}</optgroup>`;
}

window.openMembersModal = () => { renderMembersList(); document.getElementById('membersBackdrop').classList.add('open'); };
window.closeMembersModal = () => document.getElementById('membersBackdrop').classList.remove('open');
document.getElementById('membersBackdrop').addEventListener('click', e => { if(e.target===e.currentTarget) closeMembersModal(); });

// ── Tabs ───────────────────────────────────────────────────────────────────
function rebuildTabs() {
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');
  const ids = new Set(PEOPLE.map(p=>p._key));

  tabsEl.querySelectorAll('.tab[data-pid]').forEach(t => { if(!ids.has(t.dataset.pid)) t.remove(); });

  PEOPLE.forEach(p => {
    const pid = p._key;
    const isOpe = isSupport(p);

    if (!isOpe) { document.getElementById(`tab-${pid}`)?.remove(); }

    if (isOpe && !document.getElementById(`tab-${pid}`)) {
      const tab = document.createElement('div');
      tab.className = 'tab'; tab.id = `tab-${pid}`; tab.dataset.pid = pid;
      tab.onclick = () => switchTab(pid);
      tab.innerHTML = `<div class="tab-avatar" style="background:${p.color}">${p.initials}</div>${p.name}<span class="tab-count" id="count-${pid}">0</span>`;
      tabsEl.appendChild(tab);
    } else if (isOpe) {
      const av = document.querySelector(`#tab-${pid} .tab-avatar`);
      if (av) { av.style.background = p.color; av.textContent = p.initials; }
    }

    if (!document.getElementById(`view-${pid}`)) {
      const view = document.createElement('div');
      view.className = 'person-view'; view.id = `view-${pid}`; view.dataset.pid = pid;
      view.innerHTML = '<div class="loading"><i class="ti ti-loader" style="font-size:20px"></i></div>';
      contentEl.appendChild(view);
      listenPerson(pid);
    }
  });

  if (!activePid || !document.getElementById(`tab-${activePid}`)) {
    const first = PEOPLE.find(p => isSupport(p));
    if (first) switchTab(first._key);
  }
}

// ── Projects ───────────────────────────────────────────────────────────────
function listenPerson(pid) {
  onValue(ref(db,`projects/${pid}`), snap => {
    const projs = [];
    snap.forEach(c => projs.push({_key:c.key,...c.val()}));
    renderView(pid, projs);
    const el = document.getElementById(`count-${pid}`);
    if (el) el.textContent = projs.length;
  });
}

function renderView(pid, projs) {
  const fait = projs.filter(p=>p.status==='Fait').length;
  const enC  = projs.filter(p=>p.status==='En cours').length;
  const blq  = projs.filter(p=>p.status==='Bloqué').length;

  let html = `<div class="stats-row">
    <div class="stat-card"><div class="stat-label">Projets</div><div class="stat-value">${projs.length}</div></div>
    <div class="stat-card"><div class="stat-label">Fait</div><div class="stat-value" style="color:#00C875">${fait}</div></div>
    <div class="stat-card"><div class="stat-label">En cours</div><div class="stat-value" style="color:#FDAB3D">${enC}</div></div>
    <div class="stat-card"><div class="stat-label">Bloqué</div><div class="stat-value" style="color:#E2445C">${blq}</div></div>
  </div><div class="section-title">Projets</div><div class="project-list">`;

  if (!projs.length) {
    html += '<div class="empty-state"><i class="ti ti-inbox" style="font-size:36px;display:block;margin-bottom:12px;opacity:.35"></i>Aucun projet pour l\'instant</div>';
  } else {
    projs.forEach(proj => {
      const s = STATUTS[proj.status] || STATUTS['Pas commencé'];
      const authors = ['Admin',...PEOPLE.map(p=>p.name)];
      html += `<div class="project-card" id="card-${proj._key}">
        <div class="project-header" onclick="toggleCard('${proj._key}')">
          <div class="status-stripe" style="background:${s.color}"></div>
          <div class="project-info">
            <div class="project-name">${proj.name}</div>
            <div class="project-sub">
              <span class="project-date">${proj.date||''}</span>
              <div class="pct-wrap">
                <div class="pct-bar"><div class="pct-fill" style="width:${proj.pct||0}%;background:${s.color}"></div></div>
                <span class="pct-label">${proj.pct||0}%</span>
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <select class="status-badge" style="background:${s.bg};color:${s.text}" onclick="event.stopPropagation()" onchange="changeStatus('${pid}','${proj._key}',this.value)">
              ${Object.keys(STATUTS).map(st=>`<option${st===proj.status?' selected':''}>${st}</option>`).join('')}
            </select>
            <span class="msg-count" id="msgcount-${proj._key}"><i class="ti ti-message-circle" style="font-size:14px"></i>…</span>
            <i class="ti ti-chevron-down chevron-icon"></i>
          </div>
        </div>
        <div class="messages-panel">
          ${proj.desc||proj.link||proj.priority ? `<div class="proj-info-panel">
            ${proj.priority?`<div style="font-size:12px"><span style="color:var(--text2)">Priorité :</span> <strong style="font-weight:500">${proj.priority==='haute'?'🔴 Haute':proj.priority==='normale'?'🟡 Normale':'🟢 Basse'}</strong></div>`:''}
            ${proj.desc?`<div style="font-size:13px;color:var(--text2);line-height:1.55">${proj.desc}</div>`:''}
            ${proj.link?`<a href="${proj.link}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#579BFC;font-weight:500;text-decoration:none"><i class="ti ti-external-link" style="font-size:14px"></i>${proj.linkLabel||'Ouvrir le fichier'}</a>`:''}
          </div>`:''}
          <div class="pct-editor">
            <label>Avancement :</label>
            <input type="range" min="0" max="100" step="5" value="${proj.pct||0}"
              oninput="document.getElementById('pv-${proj._key}').textContent=this.value+'%'"
              onchange="changePct('${pid}','${proj._key}',this.value)">
            <span class="pct-val" id="pv-${proj._key}">${proj.pct||0}%</span>
          </div>
          <div class="msg-thread" id="thread-${proj._key}"><div class="empty-thread">Chargement…</div></div>
          <div class="author-row">
            <label>Envoyer en tant que :</label>
            <select id="author-${proj._key}">${authors.map(a=>`<option>${a}</option>`).join('')}</select>
          </div>
          <div class="input-zone">
            <textarea id="input-${proj._key}" placeholder="Écrire… @Prénom pour mentionner (Entrée pour envoyer)"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('${pid}','${proj._key}')}"
              oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
            <button class="send-btn" onclick="sendMsg('${pid}','${proj._key}')"><i class="ti ti-send" style="font-size:17px"></i></button>
          </div>
        </div>
      </div>`;
    });
  }

  html += `</div><button class="add-project-btn" onclick="openModal('${pid}')"><i class="ti ti-plus" style="font-size:16px"></i> Ajouter un projet</button>`;

  const view = document.getElementById(`view-${pid}`);
  const open = new Set();
  view.querySelectorAll('.project-card.open').forEach(c => open.add(c.id));
  view.innerHTML = html;
  open.forEach(id => document.getElementById(id)?.classList.add('open'));
  projs.forEach(p => listenMsgs(p._key, p.name));
}

// ── Messages ───────────────────────────────────────────────────────────────
function listenMsgs(projKey, projName) {
  projNames[projKey] = projName;
  if (listenedProjs.has(projKey)) return;
  listenedProjs.add(projKey);
  let first = true;
  onValue(ref(db,`messages/${projKey}`), snap => {
    const msgs = [];
    snap.forEach(c => {
      const k = c.key, v = {_key:k,...c.val()};
      msgs.push(v);
      if (!first && !knownKeys.has(k)) maybeNotify(projNames[projKey]||'', v);
      knownKeys.add(k);
    });
    first = false;
    const thread = document.getElementById(`thread-${projKey}`);
    const count  = document.getElementById(`msgcount-${projKey}`);
    if (thread) thread.innerHTML = msgs.length
      ? msgs.map(renderMsg).join('')
      : '<div class="empty-thread">Aucun message — soyez le premier !</div>';
    if (count) count.innerHTML = `<i class="ti ti-message-circle" style="font-size:14px"></i>${msgs.length}`;
  });
}

function renderMsg(m) {
  const color = COLORS[m.author] || '#888';
  const init = (m.author||'?').substring(0,2).toUpperCase();
  const text = (m.text||'').replace(/@(\w+)/g, (match, n) =>
    `<span class="mention${myName&&n.toLowerCase()===myName.toLowerCase()?' me':''}">${match}</span>`);
  return `<div class="msg">
    <div class="msg-avatar" style="background:${color}">${init}</div>
    <div class="msg-body">
      <div class="msg-meta"><span class="msg-author">${m.author}</span><span class="msg-time">${m.time}</span></div>
      <div class="msg-bubble">${text}</div>
    </div>
  </div>`;
}

// ── Actions ────────────────────────────────────────────────────────────────
window.toggleCard   = k => document.getElementById(`card-${k}`)?.classList.toggle('open');
window.changeStatus = (pid,k,v) => update(ref(db,`projects/${pid}/${k}`), {status:v});
window.changePct    = (pid,k,v) => update(ref(db,`projects/${pid}/${k}`), {pct:parseInt(v)});

window.sendMsg = (pid, projKey) => {
  const inp = document.getElementById(`input-${projKey}`);
  const author = document.getElementById(`author-${projKey}`)?.value || 'Moi';
  const text = inp.value.trim();
  if (!text) return;
  const now = new Date();
  const time = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')} ${now.getHours()}h${now.getMinutes().toString().padStart(2,'0')}`;
  push(ref(db,`messages/${projKey}`), {author, time, text});
  inp.value = ''; inp.style.height = 'auto';
};

window.switchTab = pid => {
  activePid = pid;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${pid}`)?.classList.add('active');
  document.querySelectorAll('.person-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${pid}`)?.classList.add('active');
};

window.openModal = pid => {
  modalPid = pid;
  ['modalName','modalDesc','modalLink','modalLinkLabel'].forEach(id => document.getElementById(id).value='');
  document.getElementById('modalPct').value=0;
  document.getElementById('modalPctVal').textContent='0%';
  document.getElementById('modalBackdrop').classList.add('open');
  document.getElementById('modalName').focus();
};
window.closeModal = () => document.getElementById('modalBackdrop').classList.remove('open');
window.confirmAddProject = () => {
  const name = document.getElementById('modalName').value.trim();
  if (!name || !modalPid) return;
  push(ref(db,`projects/${modalPid}`), {
    name,
    status:    document.getElementById('modalStatus').value,
    date:      document.getElementById('modalDate').value.trim() || '—',
    pct:       parseInt(document.getElementById('modalPct').value)||0,
    priority:  document.getElementById('modalPriority').value||'',
    desc:      document.getElementById('modalDesc').value.trim()||'',
    link:      document.getElementById('modalLink').value.trim()||'',
    linkLabel: document.getElementById('modalLinkLabel').value.trim()||'',
  });
  closeModal();
};
document.getElementById('modalBackdrop').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

// ── Sync ───────────────────────────────────────────────────────────────────
onValue(ref(db,'.info/connected'), snap => {
  const live = snap.val();
  document.getElementById('syncDot').className = 'sync-dot'+(live?' live':'');
  document.getElementById('syncLabel').textContent = live ? 'En direct' : 'Reconnexion…';
});

// ── Init ───────────────────────────────────────────────────────────────────
document.head.insertAdjacentHTML('beforeend','<style>@keyframes spin{to{transform:rotate(360deg)}}.loading i{animation:spin 1s linear infinite}</style>');
await seedProjects();
await seedMembers();
listenMembers();
if (myName) { document.getElementById('myIdentity').value = myName; updateNotifBtn(); }
setTimeout(() => { appReady = true; }, 2000);
</script>
</body>
</html>
