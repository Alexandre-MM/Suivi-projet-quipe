<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Projets</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F7F5;--surface:#fff;--surface2:#F2F2F0;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A1A1A;--text2:#6B6B6B;--text3:#A0A0A0;
  --radius:10px;--radius-lg:14px;--accent:#E2445C
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1C1C1A;--surface2:#252523;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#EBEBEB;--text2:#999;--text3:#666
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:10px;height:56px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-btn:hover{color:var(--text)}
.icon-btn.active{color:#00C875;border-color:#00C875}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s}
.sync-dot.live{background:#00C875}
.filters-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 1.5rem;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none}
.filters-wrap::-webkit-scrollbar{display:none}
.filter-chip{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);white-space:nowrap;transition:all .15s;user-select:none;flex-shrink:0}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;flex-shrink:0}
.filter-divider{width:1px;height:24px;background:var(--border2);flex-shrink:0;margin:0 2px}
.content{max-width:860px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:26px;font-weight:600}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px;padding-left:2px}
.project-list{display:flex;flex-direction:column;gap:8px}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .15s}
.project-card:hover,.project-card.open{border-color:var(--border2)}
.project-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.status-stripe{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.project-info{flex:1;min-width:0}
.project-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-sub{display:flex;align-items:center;gap:8px;margin-top:4px}
.project-date{font-size:12px;color:var(--text2)}
.assignee-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;flex-shrink:0;cursor:pointer}
.pct-wrap{display:flex;align-items:center;gap:6px}
.pct-bar{width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.pct-fill{height:100%;border-radius:2px;transition:width .4s}
.pct-label{font-size:11px;color:var(--text3);min-width:26px}
.status-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;cursor:pointer;border:none;font-family:inherit}
.msg-count{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);flex-shrink:0}
.chevron-icon{font-size:16px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.project-card.open .chevron-icon{transform:rotate(180deg)}
.messages-panel{display:none;border-top:1px solid var(--border)}
.project-card.open .messages-panel{display:block}
.proj-info-panel{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.pct-editor{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.pct-editor label{font-size:12px;color:var(--text2);white-space:nowrap}
.pct-editor input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.pct-val{font-size:13px;font-weight:600;color:var(--text);min-width:36px;text-align:right}
.msg-thread{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:10px;align-items:flex-start;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;margin-top:1px}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.msg-author{font-size:13px;font-weight:500;color:var(--text)}
.msg-time{font-size:11px;color:var(--text3)}
.msg-bubble{font-size:13px;color:var(--text);background:var(--surface2);border-radius:2px var(--radius) var(--radius) var(--radius);padding:9px 13px;line-height:1.55;display:inline-block;max-width:100%;word-break:break-word}
.empty-thread{padding:12px 0;text-align:center;font-size:13px;color:var(--text3)}
.author-row{padding:10px 16px 0;display:flex;align-items:center;gap:8px}
.author-row label{font-size:12px;color:var(--text2)}
.author-row select{font-size:12px;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;outline:none}
.input-zone{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.input-zone textarea{flex:1;min-height:38px;max-height:120px;padding:9px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);resize:none;font-family:inherit;line-height:1.5;outline:none;transition:border-color .15s}
.input-zone textarea:focus{border-color:var(--accent)}
.input-zone textarea::placeholder{color:var(--text3)}
.send-btn{width:38px;height:38px;border-radius:var(--radius);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.send-btn:hover{opacity:.85}
.mention{background:#fef3c7;color:#92400e;border-radius:4px;padding:1px 5px;font-weight:600;font-size:12px}
.mention.me{background:#E2445C;color:#fff}
.add-project-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius-lg);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px;transition:all .15s}
.add-project-btn:hover{border-color:var(--accent);color:var(--accent)}
.empty-state{text-align:center;padding:3rem 0;color:var(--text3);font-size:14px}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:480px;margin:1rem;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{padding:8px 16px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.btn-confirm{padding:8px 16px;font-size:13px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;font-weight:500}
.role-pill{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
.role-cdp{background:#EEF4FF;color:#185FA5}
.role-sup{background:#E8F5E9;color:#166534}
@media(max-width:600px){
  .content{padding:.75rem}
  .topbar,.filters-wrap{padding:0 .75rem}
  .filters-wrap{padding-top:10px;padding-bottom:10px}
  .project-header{padding:12px;gap:8px}
  .project-name{font-size:13px}
  .project-date,.msg-count{display:none}
  .pct-bar{width:36px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .stat-value{font-size:22px}
  .msg-thread,.input-zone,.author-row,.pct-editor,.proj-info-panel{padding-left:12px;padding-right:12px}
}

/* CALENDAR */
.view-toggle{display:flex;gap:6px;margin-left:auto}
.view-btn{padding:5px 12px;font-size:12px;font-weight:500;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cal-wrap{max-width:1100px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px}
.cal-nav-btn:hover{color:var(--text)}
.cal-title{font-size:15px;font-weight:600;color:var(--text)}
.cal-today-btn{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)}
.cal-day-header{background:var(--surface2);padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);text-align:center}
.cal-day{background:var(--surface);min-height:140px;padding:8px;display:flex;flex-direction:column;gap:4px;position:relative}
.cal-day.today{background:var(--surface)}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:2px;display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;flex-shrink:0}
.cal-day.today .cal-day-num{background:var(--accent);color:#fff}
.cal-day.other-month{background:var(--bg)}
.cal-day.other-month .cal-day-num{color:var(--text3);opacity:.4}
.cal-event{padding:3px 7px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .15s;line-height:1.4}
.cal-event:hover{opacity:.8}
.cal-event.deadline{border-left:3px solid;}
.cal-event.created{border-left:3px solid;opacity:.7}
.cal-more{font-size:10px;color:var(--text3);cursor:pointer;padding:2px 4px}
.cal-legend{display:flex;align-items:center;gap:16px;margin-bottom:12px;font-size:12px;color:var(--text2)}
.cal-legend-item{display:flex;align-items:center;gap:6px}
.cal-legend-dot{width:10px;height:3px;border-radius:2px}
@media(max-width:700px){
  .cal-grid{grid-template-columns:repeat(7,1fr)}
  .cal-day{min-height:80px;padding:4px}
  .cal-event{font-size:10px;padding:2px 4px}
  .cal-wrap{padding:.75rem}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-dot"></div> Suivi Projets</div>
  <button class="icon-btn" onclick="openMembersModal()" title="Gérer les membres"><i class="ti ti-users" style="font-size:16px"></i></button>
  <div class="topbar-right">
    <label style="font-size:12px;color:var(--text3)">Je suis :</label>
    <select id="myIdentity" onchange="setIdentity(this.value)" style="font-size:12px;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;outline:none"></select>
    <button id="notifBtn" class="icon-btn" onclick="requestNotifPermission()" style="display:none" title="Activer les notifications"><i class="ti ti-bell" style="font-size:16px"></i></button>
    <div class="sync-badge"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Connexion…</span></div>
  </div>
</div>

<div class="filters-wrap" id="filters"></div>
<div class="content" id="content"></div>
<div class="cal-wrap" id="calWrap" style="display:none">
  <div class="cal-legend">
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#E2445C"></div> Date limite</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#94a3b8"></div> Date de création</div>
  </div>
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()"><i class="ti ti-chevron-left"></i></button>
    <span class="cal-title" id="calTitle"></span>
    <button class="cal-nav-btn" onclick="calNext()"><i class="ti ti-chevron-right"></i></button>
    <button class="cal-today-btn" onclick="calToday()">Aujourd'hui</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- Modal nouveau projet -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3>Nouveau projet</h3>
    <label>Nom du projet *</label>
    <input type="text" id="modalName" placeholder="Ex: CANAL TOYS UK - Variations">
    <label>Assigner à *</label>
    <select id="modalAssignee"></select>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
      <div><label style="margin-top:0">Date limite</label><input type="text" id="modalDate" placeholder="Ex: mai 15"></div>
      <div><label style="margin-top:0">Priorité</label>
        <select id="modalPriority">
          <option value="">— aucune —</option>
          <option value="haute">🔴 Haute</option>
          <option value="normale">🟡 Normale</option>
          <option value="basse">🟢 Basse</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
      <div><label style="margin-top:0">Statut</label>
        <select id="modalStatus"><option>Pas commencé</option><option>En cours</option><option>Fait</option><option>Bloqué</option></select>
      </div>
      <div><label style="margin-top:0">Avancement</label>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <input type="range" id="modalPct" min="0" max="100" step="5" value="0" style="flex:1;accent-color:#E2445C" oninput="document.getElementById('modalPctVal').textContent=this.value+'%'">
          <span id="modalPctVal" style="font-size:12px;font-weight:600;min-width:32px">0%</span>
        </div>
      </div>
    </div>
    <label>Description / contexte</label>
    <textarea id="modalDesc" placeholder="Informations utiles, contexte client…" style="min-height:72px;resize:vertical"></textarea>
    <label>Lien fichier</label>
    <div style="display:flex;gap:8px">
      <input type="url" id="modalLink" placeholder="https://drive.google.com/…" style="flex:1">
      <input type="text" id="modalLinkLabel" placeholder="Nom" style="width:120px">
    </div>
    <label>Estimation du temps</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="number" id="modalTimeVal" placeholder="Ex: 2" min="0" step="0.5" style="width:100px">
      <select id="modalTimeUnit" style="flex:1">
        <option value="minutes">minutes</option>
        <option value="heures" selected>heures</option>
        <option value="jours">jours</option>
        <option value="semaines">semaines</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmAddProject()">Ajouter</button>
    </div>
  </div>
</div>

<!-- Modal membres -->
<div class="modal-backdrop" id="membersBackdrop">
  <div class="modal">
    <h3>Gérer les membres</h3>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button id="filterAll" onclick="setMemberFilter('all')" style="flex:1;padding:6px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);cursor:pointer;font-family:inherit;background:var(--accent);color:#fff">Tous</button>
      <button id="filterCdp" onclick="setMemberFilter('cdp')" style="flex:1;padding:6px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);cursor:pointer;font-family:inherit;background:var(--surface);color:var(--text2)">Consultants</button>
      <button id="filterSup" onclick="setMemberFilter('sup')" style="flex:1;padding:6px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);cursor:pointer;font-family:inherit;background:var(--surface);color:var(--text2)">Supports</button>
    </div>
    <div id="membersList" style="display:flex;flex-direction:column;gap:7px;max-height:220px;overflow-y:auto;margin-bottom:16px"></div>
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <p style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Ajouter un membre</p>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="text" id="newMemberName" placeholder="Prénom" style="flex:1;padding:8px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;font-family:inherit">
        <input type="text" id="newMemberInitials" placeholder="XX" style="width:60px;padding:8px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;font-family:inherit">
        <input type="color" id="newMemberColor" value="#579BFC" style="width:40px;height:38px;padding:2px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer">
      </div>
      <div style="display:flex;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;flex:1;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);margin:0">
          <input type="radio" name="newRole" value="support" checked> Support <span style="font-size:10px;color:var(--text3)">(filtre visible)</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;flex:1;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);margin:0">
          <input type="radio" name="newRole" value="cdp"> Consultant <span style="font-size:10px;color:var(--text3)">(crée des tâches)</span>
        </label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeMembersModal()">Fermer</button>
      <button class="btn-confirm" onclick="addMember()">Ajouter</button>
    </div>
  </div>
</div>

<script type="module">

function listenMsgs(projKey,projName){
  projNames[projKey]=projName;
  if(listenedProjs.has(projKey)) return;
  listenedProjs.add(projKey);
  let first=true;
  onValue(ref(db,`messages/${projKey}`),snap=>{
    const msgs=[];
    snap.forEach(c=>{
      const k=c.key,v={_key:k,...c.val()};msgs.push(v);
      if(!first&&!knownKeys.has(k)) maybeNotify(projNames[projKey]||'',v);
      knownKeys.add(k);
    });
    first=false;
    const thread=document.getElementById(`thread-${projKey}`);
    const count=document.getElementById(`msgcount-${projKey}`);
    if(thread) thread.innerHTML=msgs.length?msgs.map(renderMsg).join(''):'<div class="empty-thread">Aucun message — soyez le premier !</div>';
    if(count) count.innerHTML=`<i class="ti ti-message-circle" style="font-size:14px"></i>${msgs.length}`;
  });
}
function renderMsg(m){
  const color=COLORS[m.author]||'#888';
  const init=(m.author||'?').substring(0,2).toUpperCase();
  const text=(m.text||'').replace(/@(\w+)/g,(match,n)=>`<span class="mention${myName&&n.toLowerCase()===myName.toLowerCase()?' me':''}">${match}</span>`);
  return `<div class="msg"><div class="msg-avatar" style="background:${color}">${init}</div><div class="msg-body"><div class="msg-meta"><span class="msg-author">${m.author}</span><span class="msg-time">${m.time}</span></div><div class="msg-bubble">${text}</div></div></div>`;
}

// Parse dates like "mai 6", "févr. 20", "mai 15" → Date object (current year)
const MONTHS = {
  'jan':0,'janv':0,'fév':1,'févr':1,'mar':2,'mars':2,'avr':3,'mai':4,
  'juin':5,'juil':6,'aoû':7,'août':7,'sep':8,'sept':8,'oct':9,'nov':10,'déc':11
};
function parseDate(str) {
  if (!str || str==='—') return null;
  const parts = str.trim().toLowerCase().replace('.','').split(' ');
  if (parts.length < 2) return null;
  const month = MONTHS[parts[0]];
  const day = parseInt(parts[1]);
  if (month === undefined || isNaN(day)) return null;
  const year = new Date().getFullYear();
  return new Date(year, month, day);
}

function getWeekStart(d) {
  const date = new Date(d);
  const day = date.getDay(); // 0=Sun
  const diff = (day === 0) ? -6 : 1 - day; // Monday start
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}

function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function formatWeekTitle(start) {
  const end = new Date(start); end.setDate(end.getDate()+6);
  const months = ['jan','fév','mars','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  const sm = months[start.getMonth()], em = months[end.getMonth()];
  if (sm === em) return `${start.getDate()} – ${end.getDate()} ${sm} ${start.getFullYear()}`;
  return `${start.getDate()} ${sm} – ${end.getDate()} ${em} ${start.getFullYear()}`;
}

function renderCalendar() {
  const weekStart = getWeekStart(calDate);
  document.getElementById('calTitle').textContent = formatWeekTitle(weekStart);

  const days = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const today = new Date(); today.setHours(0,0,0,0);

  // Collect all projects
  const allProjs = Object.values(ALL_PROJECTS).flat();

  // Build events per day index (0-6)
  const eventsByDay = Array.from({length:7}, ()=>[]);

  allProjs.forEach(proj => {
    const assignee = PEOPLE.find(p => p._key === proj._pid);
    const color = assignee ? assignee.color : '#888';
    const name = proj.name.length > 28 ? proj.name.slice(0,26)+'…' : proj.name;

    // Deadline event
    const dlDate = parseDate(proj.date);
    if (dlDate) {
      for (let i=0; i<7; i++) {
        const d = new Date(weekStart); d.setDate(d.getDate()+i);
        if (sameDay(d, dlDate)) {
          eventsByDay[i].push({
            name, color, type:'deadline',
            label: '🏁 ' + name,
            projKey: proj._key, pid: proj._pid, status: proj.status
          });
        }
      }
    }
  });

  const grid = document.getElementById('calGrid');
  let html = days.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  for (let i=0; i<7; i++) {
    const d = new Date(weekStart); d.setDate(d.getDate()+i);
    const isToday = sameDay(d, today);
    const events = eventsByDay[i];
    const statusColors = {'Fait':'#00C875','En cours':'#FDAB3D','Pas commencé':'#C4C4C4','Bloqué':'#E2445C'};

    html += `<div class="cal-day${isToday?' today':''}">
      <div class="cal-day-num">${d.getDate()}</div>`;

    const shown = events.slice(0, 6);
    shown.forEach(ev => {
      const sc = statusColors[ev.status]||'#C4C4C4';
      const bg = ev.color + '22';
      html += `<div class="cal-event" style="background:${bg};border-left-color:${sc};color:var(--text)"
        onclick="openProjectFromCal('${ev.projKey}')" title="${ev.name}">
        ${ev.label}
      </div>`;
    });
    if (events.length > 6) {
      html += `<div class="cal-more">+${events.length-6} autres</div>`;
    }

    html += `</div>`;
  }

  grid.innerHTML = html;
}

window.openProjectFromCal = (projKey) => {
  // Switch to list view and open the card
  switchView('list');
  setTimeout(() => {
    const card = document.getElementById(`card-${projKey}`);
    if (card) {
      card.classList.add('open');
      card.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }, 100);
};
