<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Projets — Équipe</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F7F5; --surface: #FFFFFF; --surface2: #F2F2F0;
    --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
    --text: #1A1A1A; --text2: #6B6B6B; --text3: #A0A0A0;
    --radius: 10px; --radius-lg: 14px; --accent: #E2445C;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110; --surface: #1C1C1A; --surface2: #252523;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
      --text: #EBEBEB; --text2: #999; --text3: #666;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 12px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .sync-badge { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
  .sync-dot.live { background: #00C875; }

  .tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab { display: flex; align-items: center; gap: 8px; padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; user-select: none; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0; }
  .tab-count { font-size: 11px; background: var(--surface2); color: var(--text3); border-radius: 20px; padding: 1px 7px; }

  .content { max-width: 820px; margin: 0 auto; padding: 1.25rem 1.5rem 3rem; }
  .person-view { display: none; }
  .person-view.active { display: block; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-value { font-size: 26px; font-weight: 600; }

  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 10px; padding-left: 2px; }

  .project-list { display: flex; flex-direction: column; gap: 8px; }
  .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s; }
  .project-card:hover { border-color: var(--border2); }
  .project-card.open { border-color: var(--border2); }

  .project-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .status-stripe { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
  .project-info { flex: 1; min-width: 0; }
  .project-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .project-sub { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .project-date { font-size: 12px; color: var(--text2); }
  .pct-wrap { display: flex; align-items: center; gap: 6px; }
  .pct-bar { width: 60px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .pct-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .pct-label { font-size: 11px; color: var(--text3); min-width: 26px; }
  .status-badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; cursor: pointer; border: none; font-family: inherit; }
  .msg-count { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); flex-shrink: 0; }
  .chevron-icon { font-size: 16px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
  .project-card.open .chevron-icon { transform: rotate(180deg); }

  .messages-panel { display: none; border-top: 1px solid var(--border); }
  .project-card.open .messages-panel { display: block; }

  .msg-thread { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; min-height: 20px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; margin-top: 1px; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
  .msg-author { font-size: 13px; font-weight: 500; color: var(--text); }
  .msg-time { font-size: 11px; color: var(--text3); }
  .msg-bubble { font-size: 13px; color: var(--text); background: var(--surface2); border-radius: 2px var(--radius) var(--radius) var(--radius); padding: 9px 13px; line-height: 1.55; display: inline-block; max-width: 100%; word-break: break-word; }
  .empty-thread { padding: 12px 0; text-align: center; font-size: 13px; color: var(--text3); }

  .input-zone { padding: 10px 16px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
  .input-zone textarea { flex: 1; min-height: 38px; max-height: 120px; padding: 9px 12px; font-size: 13px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text); resize: none; font-family: inherit; line-height: 1.5; transition: border-color 0.15s; outline: none; }
  .input-zone textarea:focus { border-color: var(--accent); }
  .input-zone textarea::placeholder { color: var(--text3); }
  .send-btn { width: 38px; height: 38px; border-radius: var(--radius); background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; color: #fff; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn i { font-size: 17px; }

  .author-row { padding: 10px 16px 0; display: flex; align-items: center; gap: 8px; }
  .author-row label { font-size: 12px; color: var(--text2); }
  .author-row select { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; outline: none; }

  .add-project-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 12px 16px; background: var(--surface); border: 1px dashed var(--border2); border-radius: var(--radius-lg); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .add-project-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface); }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 480px; margin: 1rem; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
  .modal label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select { width: 100%; padding: 8px 12px; font-size: 13px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text); outline: none; font-family: inherit; }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-cancel { padding: 8px 16px; font-size: 13px; border: 1px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; }
  .btn-confirm { padding: 8px 16px; font-size: 13px; border: none; border-radius: var(--radius); background: var(--accent); color: #fff; cursor: pointer; font-family: inherit; font-weight: 500; }

  .empty-state { text-align: center; padding: 3rem 0; color: var(--text3); font-size: 14px; }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 12px; opacity: 0.35; }

  .loading { text-align: center; padding: 3rem; color: var(--text3); font-size: 13px; }

  .pct-editor { padding: 12px 16px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .pct-editor label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .pct-editor input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
  .pct-editor .pct-val { font-size: 13px; font-weight: 600; color: var(--text); min-width: 36px; text-align: right; }

  .mention { background: #fef3c7; color: #92400e; border-radius: 4px; padding: 1px 5px; font-weight: 600; font-size: 12px; }
  .mention.me { background: #E2445C; color: #fff; }
  #notifBtn.active { color: #00C875; border-color: #00C875; }
  @media (max-width: 600px) {
    .content { padding: 0.75rem; }
    .topbar { padding: 0 0.75rem; }
    .tabs-wrap { padding: 0 0.5rem; }
    .tab { padding: 10px 10px; font-size: 12px; gap: 6px; }
    .tab-avatar { width: 20px; height: 20px; font-size: 9px; }
    .project-header { padding: 12px 12px; gap: 8px; }
    .project-name { font-size: 13px; }
    .project-date { display: none; }
    .pct-bar { width: 36px; }
    .msg-count { display: none; }
    .status-badge { font-size: 10px; padding: 2px 7px; }
    .msg-thread { padding: 10px 12px; }
    .input-zone { padding: 8px 12px 12px; }
    .author-row { padding: 8px 12px 0; }
    .pct-editor { padding: 10px 12px 12px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-dot"></div> Suivi Projets</div>

<div class="tabs-wrap" id="tabs"></div>
<div class="content" id="content"></div>

<div class="modal-backdrop" id="modalBackdrop">

    <h3>Nouveau projet</h3>

    <label>Nom du projet *</label>
    <input type="text" id="modalName" placeholder="Ex: CANAL TOYS UK - Variations">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
      <div>
        <label style="margin-top:0">Date limite</label>
        <input type="text" id="modalDate" placeholder="Ex: mai 15">
      </div>
      <div>
        <label style="margin-top:0">Priorité</label>
        <select id="modalPriority">
          <option value="">— aucune —</option>
          <option value="haute">🔴 Haute</option>
          <option value="normale">🟡 Normale</option>
          <option value="basse">🟢 Basse</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
      <div>
        <label style="margin-top:0">Statut</label>

          <option>Pas commencé</option>

          <option>Fait</option>
          <option>Bloqué</option>

        <label style="margin-top:0">Avancement</label>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <input type="range" id="modalPct" min="0" max="100" step="5" value="0" style="flex:1;accent-color:#E2445C"
            oninput="document.getElementById('modalPctVal').textContent=this.value+'%'">
          <span id="modalPctVal" style="font-size:12px;font-weight:600;min-width:32px">0%</span>
        </div>
      </div>
    </div>

    <label>Description / contexte</label>
    <textarea id="modalDesc" placeholder="Informations utiles, contexte client, instructions…" style="width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);resize:vertical;min-height:72px;font-family:inherit;outline:none;line-height:1.5"></textarea>

    <label>Lien fichier / document</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="url" id="modalLink" placeholder="https://drive.google.com/…" style="flex:1">
      <input type="text" id="modalLinkLabel" placeholder="Nom du lien" style="width:130px">
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:4px">Google Drive, Dropbox, OneDrive, Notion…</p>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmAddProject()">Ajouter le projet</button>
    </div>
  </div>
</div>

// Seed initial data if DB is empty

let currentPid = 'kim';
let modalPid = null;
let myName = localStorage.getItem('myName') || '';
let knownMsgKeys = new Set();
let appReady = false;

// ── Identity & notifications ───────────────────────────────────────────────
window.setIdentity = (name) => {
  myName = name;
  localStorage.setItem('myName', name);
  updateNotifBtn();
};

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!myName) { btn.style.display = 'none'; return; }
  btn.style.display = 'flex';
  if (Notification.permission === 'granted') {
    btn.classList.add('active');
    btn.title = 'Notifications activées';
  } else {
    btn.classList.remove('active');
    btn.title = 'Cliquer pour activer les notifications';
  }
}

window.requestNotifPermission = async () => {
  const perm = await Notification.requestPermission();
  updateNotifBtn();
  if (perm === 'granted') showToast('Notifications activées !');
};

function maybeNotify(projName, msg) {
  if (!myName || !appReady) return;
  const mentioned = msg.text && msg.text.toLowerCase().includes('@' + myName.toLowerCase());
  if (!mentioned) return;
  if (msg.author === myName) return;
  if (Notification.permission === 'granted') {
    const n = new Notification(`@${myName} mentionné dans ${projName}`, {
      body: `${msg.author} : ${msg.text}`,
      icon: 'https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg',
      tag: projName,
    });
    n.onclick = () => { window.focus(); n.close(); };
  }
  showToast(`@${myName} mentionné par ${msg.author}`);
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:999;transition:opacity 0.3s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 3000);
}

// ── Seed data ──────────────────────────────────────────────────────────────
async function seedIfEmpty() {
  const snap = await new Promise(res => onValue(ref(db, 'projects'), res, { onlyOnce: true }));
  if (snap.exists()) return;
  for (const [pid, projs] of Object.entries(INITIAL_DATA)) {
    for (const proj of projs) {
      const projRef = push(ref(db, `projects/${pid}`));
      const { messages, ...projData } = proj;
      await set(projRef, { ...projData, pct: projData.pct });
      if (messages && messages.length) {
        for (const msg of messages) {
          await push(ref(db, `messages/${projRef.key}`), msg);
        }
      }
    }
  }
}

// ── Build static tabs + containers ────────────────────────────────────────
function buildShell() {
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');
  PEOPLE.forEach((p, i) => {
    const tab = document.createElement('div');
    tab.className = `tab ${i===0?'active':''}`;
    tab.id = `tab-${p.id}`;
    tab.onclick = () => switchTab(p.id);
    tab.innerHTML = `<div class="tab-avatar" style="background:${p.color}">${p.initials}</div>${p.name}<span class="tab-count" id="count-${p.id}">0</span>`;
    tabsEl.appendChild(tab);

    const view = document.createElement('div');
    view.className = `person-view ${i===0?'active':''}`;
    view.id = `view-${p.id}`;
    view.innerHTML = `<div class="loading"><i class="ti ti-loader" style="font-size:20px;animation:spin 1s linear infinite"></i></div>`;
    contentEl.appendChild(view);
  });
}

// ── Listen to projects per person ──────────────────────────────────────────
function listenPerson(pid) {
  onValue(ref(db, `projects/${pid}`), snap => {
    const projects = [];
    snap.forEach(child => projects.push({ _key: child.key, ...child.val() }));
    renderPersonView(pid, projects);
    document.getElementById(`count-${pid}`).textContent = projects.length;
  });
}

function renderPersonView(pid, projects) {
  const fait = projects.filter(p => p.status==='Fait').length;
  const enCours = projects.filter(p => p.status==='En cours').length;
  const bloque = projects.filter(p => p.status==='Bloqué').length;

  let html = `<div class="stats-row">
    <div class="stat-card"><div class="stat-label">Projets</div><div class="stat-value">${projects.length}</div></div>
    <div class="stat-card"><div class="stat-label">Fait</div><div class="stat-value" style="color:#00C875">${fait}</div></div>
    <div class="stat-card"><div class="stat-label">En cours</div><div class="stat-value" style="color:#FDAB3D">${enCours}</div></div>
    <div class="stat-card"><div class="stat-label">Bloqué</div><div class="stat-value" style="color:#E2445C">${bloque}</div></div>
  </div>
  <div class="section-title">Projets</div>
  <div class="project-list" id="list-${pid}">`;

  if (projects.length === 0) {
    html += `<div class="empty-state"><i class="ti ti-inbox"></i>Aucun projet pour l'instant</div>`;
  } else {
    projects.forEach(proj => {
      const s = STATUTS[proj.status] || STATUTS['Pas commencé'];
      html += `<div class="project-card" id="card-${proj._key}">
        <div class="project-header" onclick="toggleCard('${proj._key}')">
          <div class="status-stripe" style="background:${s.color}"></div>
          <div class="project-info">
            <div class="project-name">${proj.name}</div>
            <div class="project-sub">
              <span class="project-date">${proj.date||''}</span>
              <div class="pct-wrap">
                <div class="pct-bar"><div class="pct-fill" style="width:${proj.pct||0}%;background:${s.color}"></div></div>
                <span class="pct-label">${proj.pct||0}%</span>
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <select class="status-badge" style="background:${s.bg};color:${s.text}" onclick="event.stopPropagation()" onchange="changeStatus('${pid}','${proj._key}',this.value)">
              ${Object.keys(STATUTS).map(st => `<option${st===proj.status?' selected':''}>${st}</option>`).join('')}
            </select>
            <span class="msg-count" id="msgcount-${proj._key}"><i class="ti ti-message-circle" style="font-size:14px"></i>…</span>
            <i class="ti ti-chevron-down chevron-icon"></i>
          </div>
        </div>
        <div class="messages-panel">
          ${proj.desc || proj.link || proj.priority ? `
          <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px">
            ${proj.priority ? `<div style="display:flex;align-items:center;gap:8px;font-size:12px">
              <span style="color:var(--text2)">Priorité :</span>
              <span style="font-weight:500;color:var(--text)">${proj.priority==='haute'?'🔴 Haute':proj.priority==='normale'?'🟡 Normale':'🟢 Basse'}</span>
            </div>` : ''}
            ${proj.desc ? `<div style="font-size:13px;color:var(--text2);line-height:1.55">${proj.desc}</div>` : ''}
            ${proj.link ? `<a href="${proj.link}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#579BFC;text-decoration:none;font-weight:500">
              <i class="ti ti-external-link" style="font-size:14px"></i>${proj.linkLabel || 'Ouvrir le fichier'}
            </a>` : ''}
          </div>` : ''}
          <div class="pct-editor">
            <label>Avancement :</label>
            <input type="range" min="0" max="100" step="5" value="${proj.pct||0}"
              oninput="document.getElementById('pctval-${proj._key}').textContent=this.value+'%'"
              onchange="changePct('${pid}','${proj._key}',this.value)">
            <span class="pct-val" id="pctval-${proj._key}">${proj.pct||0}%</span>
          </div>
          <div class="msg-thread" id="thread-${proj._key}"><div class="empty-thread">Chargement…</div></div>
          <div class="author-row">
            <label>Envoyer en tant que :</label>
            <select id="author-${proj._key}">${ALL_AUTHORS.map(a=>`<option>${a}</option>`).join('')}</select>
          </div>
          <div class="input-zone">
            <textarea id="input-${proj._key}" placeholder="Écrire un message… (Entrée pour envoyer)"
              onkeydown="handleKey(event,'${pid}','${proj._key}')"
              oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'" placeholder="Écrire un message… Utilisez @Kim, @Nathan… pour mentionner"></textarea>
            <button class="send-btn" onclick="sendMsg('${pid}','${proj._key}')" title="Envoyer">
              <i class="ti ti-send"></i>
            </button>
          </div>
        </div>
      </div>`;
    });
  }

  html += `</div>
  <button class="add-project-btn" style="margin-top:10px" onclick="openModal('${pid}')">
    <i class="ti ti-plus" style="font-size:16px"></i> Ajouter un projet
  </button>`;

  const view = document.getElementById(`view-${pid}`);
  const openCards = new Set();
  view.querySelectorAll('.project-card.open').forEach(c => openCards.add(c.id));
  view.innerHTML = html;
  openCards.forEach(id => {
    const card = document.getElementById(id);
    if (card) card.classList.add('open');
  });

  projects.forEach(proj => listenMessages(proj._key, proj.name));
}

// ── Listen to messages ─────────────────────────────────────────────────────
const listenedKeys = new Set();
const projNameMap = {};

function listenMessages(projKey, projName) {
  projNameMap[projKey] = projName;
  if (listenedKeys.has(projKey)) return;
  listenedKeys.add(projKey);
  let firstLoad = true;
  onValue(ref(db, `messages/${projKey}`), snap => {
    const msgs = [];
    snap.forEach(child => {
      const key = child.key;
      const val = { _key: key, ...child.val() };
      msgs.push(val);
      if (!firstLoad && !knownMsgKeys.has(key)) {
        maybeNotify(projNameMap[projKey] || projKey, val);
      }
      knownMsgKeys.add(key);
    });
    firstLoad = false;
    const thread = document.getElementById(`thread-${projKey}`);
    const countEl = document.getElementById(`msgcount-${projKey}`);
    if (thread) {
      thread.innerHTML = msgs.length === 0
        ? `<div class="empty-thread">Aucun message — soyez le premier !</div>`
        : msgs.map(m => renderMsg(m)).join('');
    }
    if (countEl) countEl.innerHTML = `<i class="ti ti-message-circle" style="font-size:14px"></i>${msgs.length}`;
  });
}

function renderMsg(m) {
  const color = AUTHOR_COLORS[m.author] || '#888';
  const initials = (m.author||'?').substring(0,2).toUpperCase();
  const text = (m.text||'').replace(/@(\w+)/g, (match, name) => {
    const isSelf = myName && name.toLowerCase() === myName.toLowerCase();
    return `<span class="mention${isSelf?' me':''}">${match}</span>`;
  });
  return `<div class="msg">
    <div class="msg-avatar" style="background:${color}">${initials}</div>
    <div class="msg-body">
      <div class="msg-meta"><span class="msg-author">${m.author}</span><span class="msg-time">${m.time}</span></div>
      <div class="msg-bubble">${text}</div>
    </div>
  </div>`;
}

// ── Actions ────────────────────────────────────────────────────────────────
window.toggleCard = (key) => {
  document.getElementById(`card-${key}`)?.classList.toggle('open');
};

window.sendMsg = (pid, projKey) => {
  const input = document.getElementById(`input-${projKey}`);
  const authorEl = document.getElementById(`author-${projKey}`);
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  const time = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')} ${now.getHours()}h${now.getMinutes().toString().padStart(2,'0')}`;
  push(ref(db, `messages/${projKey}`), { author: authorEl?.value || 'Moi', time, text });
  input.value = ''; input.style.height = 'auto';
};

window.handleKey = (e, pid, projKey) => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); window.sendMsg(pid, projKey); }
};

window.changePct = (pid, projKey, val) => {
  update(ref(db, `projects/${pid}/${projKey}`), { pct: parseInt(val) });
};

window.changeStatus = (pid, projKey, newStatus) => {
  update(ref(db, `projects/${pid}/${projKey}`), { status: newStatus });
};

window.switchTab = (pid) => {
  currentPid = pid;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${pid}`).classList.add('active');
  document.querySelectorAll('.person-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${pid}`).classList.add('active');
};

window.openModal = (pid) => {
  modalPid = pid;
  document.getElementById('modalBackdrop').classList.add('open');
  document.getElementById('modalName').focus();
  document.getElementById('modalPct').value = 0;
  document.getElementById('modalPctVal').textContent = '0%';
  document.getElementById('modalDesc').value = '';
  document.getElementById('modalLink').value = '';
  document.getElementById('modalLinkLabel').value = '';
};
window.closeModal = () => {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.getElementById('modalName').value = '';
};
window.confirmAddProject = () => {
  const name = document.getElementById('modalName').value.trim();
  if (!name || !modalPid) return;
  const status   = document.getElementById('modalStatus').value;
  const date     = document.getElementById('modalDate').value.trim() || '—';
  const pct      = parseInt(document.getElementById('modalPct').value) || 0;
  const priority = document.getElementById('modalPriority').value || '';
  const desc     = document.getElementById('modalDesc').value.trim() || '';
  const link     = document.getElementById('modalLink').value.trim() || '';
  const linkLabel= document.getElementById('modalLinkLabel').value.trim() || '';
  push(ref(db, `projects/${modalPid}`), { name, status, date, pct, priority, desc, link, linkLabel });
  closeModal();
};

document.getElementById('modalBackdrop').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

// ── Sync indicator ─────────────────────────────────────────────────────────
onValue(ref(db, '.info/connected'), snap => {
  const live = snap.val();
  document.getElementById('syncDot').className = 'sync-dot' + (live?' live':'');
  document.getElementById('syncLabel').textContent = live ? 'En direct' : 'Reconnexion…';
});

// ── CSS spinner ────────────────────────────────────────────────────────────
const style = document.createElement('style');
style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
document.head.appendChild(style);

// ── Init ───────────────────────────────────────────────────────────────────
buildShell();
await seedIfEmpty();
PEOPLE.forEach(p => listenPerson(p.id));

if (myName) {
  const sel = document.getElementById('myIdentity');
  sel.value = myName;
  updateNotifBtn();
}
setTimeout(() => { appReady = true; }, 2000);
</script>
</body>
